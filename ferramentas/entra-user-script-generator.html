<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador Entra ID - IAM ISO 27001</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f6f8; }
.container { max-width: 900px; margin:auto; background:white; padding:20px; border-radius:8px; }
textarea { width:100%; height:220px; margin-top:10px; font-family:monospace; }
.btn { background:#0078d4; color:white; padding:10px; border:none; cursor:pointer; margin-top:10px; }
.error { color:red; margin-top:10px; }
.success { color:green; }
</style>
</head>

<body>

<div class="container">
<h2>Gerador de Script Entra ID (Estudo - ISO 27001)</h2>

<p>CSV esperado: Nome, UPN, Cargo, Departamento</p>

<input type="file" id="csvFile" accept=".csv">

<button class="btn" onclick="generateScript()">Gerar Script</button>

<div id="log"></div>

<textarea id="outputScript" readonly></textarea>

<button class="btn" onclick="downloadScript()">Baixar .ps1</button>
</div>

<script>

function parseCSV(text){
    const lines = text.split(/\r?\n/);
    return lines.map(line => {
        let result = [];
        let current = '';
        let insideQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];

            if (char === '"') {
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }

        result.push(current);
        return result;
    });
}

function generateScript(){

    const fileInput = document.getElementById('csvFile');
    const log = document.getElementById('log');

    if(!fileInput || !fileInput.files.length){
        log.innerHTML = "<div class='error'>Selecione um CSV</div>";
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        try {

            const data = parseCSV(e.target.result);

            let users = [];
            let errors = [];

            for(let i = 1; i < data.length; i++){
                const row = data[i];

                if(!row || row.length < 4){
                    continue;
                }

                const nome = (row[0] || '').trim();
                const upn = (row[1] || '').trim();
                const cargo = (row[2] || '').trim();
                const depto = (row[3] || '').trim();

                if(!nome || !upn){
                    errors.push(`Linha ${i+1} inválida`);
                    continue;
                }

                users.push({nome, upn, cargo, depto});
            }

            if(users.length === 0){
                log.innerHTML = "<div class='error'>Nenhum usuário válido encontrado</div>";
                return;
            }

            let script = "# Script gerado - IAM ISO 27001\n";
            script += "Connect-MgGraph -Scopes \"User.ReadWrite.All\"\n\n";

            users.forEach(u => {
                script += `Write-Host "Criando usuário: ${u.nome}"\n`;
                script += `New-MgUser -DisplayName "${u.nome}" -UserPrincipalName "${u.upn}" -MailNickname "${u.upn.split('@')[0]}" -AccountEnabled -JobTitle "${u.cargo}" -Department "${u.depto}" -PasswordProfile @{Password="Alterar123!"; ForceChangePasswordNextSignIn=$true}\n\n`;
            });

            script += "Disconnect-MgGraph\n";

            document.getElementById('outputScript').value = script;

            let msg = `<div class='success'>${users.length} usuários gerados</div>`;
            if(errors.length){
                msg += `<div class='error'>${errors.join("<br>")}</div>`;
            }

            log.innerHTML = msg;

        } catch (err){
            log.innerHTML = "<div class='error'>Erro ao processar CSV</div>";
            console.error(err);
        }

    };

    reader.readAsText(fileInput.files[0]);
}

function downloadScript(){

    const content = document.getElementById('outputScript').value;

    if(!content){
        alert("Gere o script primeiro");
        return;
    }

    const blob = new Blob([content], {type: 'text/plain'});
    const link = document.createElement('a');

    link.href = URL.createObjectURL(blob);
    link.download = "Provisionamento-EntraID.ps1";

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

</script>

</body>
</html>

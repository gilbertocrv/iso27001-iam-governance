<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador Entra ID - IAM ISO 27001</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f6f8; }
.container { max-width: 900px; margin:auto; background:white; padding:20px; border-radius:8px; }
textarea { width:100%; height:220px; margin-top:10px; font-family:monospace; }
.btn { background:#0078d4; color:white; padding:10px; border:none; cursor:pointer; margin-top:10px; }
.error { color:red; margin-top:10px; }
.success { color:green; }
</style>
</head>

<body>

<div class="container">
<h2>Gerador de Script Entra ID (Estudo - ISO 27001)</h2>

<p>CSV esperado: Nome, UPN, Cargo, Departamento</p>

<input type="file" id="csvFile" accept=".csv">

<button class="btn" onclick="generateScript()">Gerar Script</button>

<div id="log"></div>

<textarea id="outputScript" readonly></textarea>

<button class="btn" onclick="downloadScript()">Baixar .ps1</button>
</div>

<script>

function parseCSV(text){
    const lines = text.split(/\r?\n/);
    return lines.map(line => {
        const result = [];
        let current = '';
        let insideQuotes = false;

        for(let i=0;i<line.length;i++){
            const char = line[i];

            if(char === '"'){
                insideQuotes = !insideQuotes;
            } else if(char === ',' && !insideQuotes){
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    });
}

function generateScript(){

    const fileInput = document.getElementById('csvFile');
    const log = document.getElementById('log');

    if(!fileInput.files.length){
        log.innerHTML = "<div class='error'>Selecione um CSV</div>";
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const data = parseCSV(e.target.result);

        let errors = [];
        let users = [];

        for(let i=1;i<data.length;i++){
            const row = data[i];

            if(row.length < 4){
                errors.push(`Linha ${i+1} inválida`);
                continue;
            }

            const [nome, upn, cargo, depto] = row.map(v => v.trim());

            if(!nome || !upn){
                errors.push(`Linha ${i+1} sem nome ou UPN`);
                continue;
            }

            users.push({nome, upn, cargo, depto});
        }

        if(users.length === 0){
            log.innerHTML = "<div class='error'>Nenhum usuário válido</div>";
            return;
        }

        let script = `# ==========================================
# Script Gerado - Projeto Educacional IAM
# Data: ${new Date().toISOString()}
# ==========================================

Connect-MgGraph -Scopes "User.ReadWrite.All"

$users = @(
`;

        users.forEach(u=>{
            script += `    @{
        DisplayName = "${u.nome}"
        UserPrincipalName = "${u.upn}"
        JobTitle = "${u.cargo}"
        Department = "${u.depto}"
    }
`;
        });

        script += `)

foreach ($user in $users) {
    try {
        Write-Host "Criando usuário: $($user.DisplayName)"

        New-MgUser `
            -DisplayName $user.DisplayName `
            -UserPrincipalName $user.UserPrincipalName `
            -MailNickname ($user.UserPrincipalName.Split("@")[0]) `
            -AccountEnabled `
            -JobTitle $user.JobTitle `
            -Department $user.Department `
            -PasswordProfile @{
                Password = "Alterar123!"
                ForceChangePasswordNextSignIn = $true
            }

    } catch {
        Write-Host "Erro ao criar $($user.DisplayName)"
    }
}

Disconnect-MgGraph
`;

        document.getElementById('outputScript').value = script;

        let logMsg = `<div class='success'>${users.length} usuários processados</div>`;

        if(errors.length){
            logMsg += `<div class='error'>Erros:<br>${errors.join("<br>")}</div>`;
        }

        log.innerHTML = logMsg;
    };

    reader.readAsText(fileInput.files[0]);
}

function downloadScript(){
    const content = document.getElementById('outputScript').value;

    const blob = new Blob([content], {type: 'text/plain'});

    const link = document.createElement('a');

    link.href = URL.createObjectURL(blob);
    link.download = "Provisionamento-EntraID.ps1";

    link.click();
}

</script>

</body>
</html>

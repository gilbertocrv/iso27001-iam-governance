name: Horizon Scanning — Atualizar feeds RSS

on:
  schedule:
    - cron: '0 8 * * *'   # diariamente às 08h UTC
  workflow_dispatch:        # permite rodar manualmente

permissions:
  contents: write

jobs:
  update-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch RSS and update scanning.json
        run: python3 .github/scripts/fetch_feeds.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scanning.json
          git diff --cached --quiet || git commit -m "chore: atualizar horizon scanning [$(date +%Y-%m-%d)]"
          git push
